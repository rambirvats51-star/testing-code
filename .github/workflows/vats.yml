on:
  push:
    branches:
    - main
    
permissions:
  id-token: write
  contents: read

jobs:
  Job1:
    name: azure login
    runs-on: ubuntu-22.04
    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

     
            
 

    

