on:
  workflow_dispatch:

jobs:
  job1:
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: 8cade307-832f-4fcd-a576-8a553f6edb82
          tenant-id: 8b0de87e-c47c-48cf-9e8e-1250310c221d
          subscription-id: 5b9f49a3-8bda-49fa-88c0-baf31ef2f4f3
          enable-AzPSSession: true

  job2:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.6"

      - name: Terraform Init
        run: terraform init
